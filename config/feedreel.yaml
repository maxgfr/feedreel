# ════════════════════════════════════════════════════════════════════════════
#  feedreel configuration — EDITABLE without touching the code.
#  Edit categories, feeds, colors, languages here. Validated at startup (zod).
#  Path overridable via the FEEDREEL_CONFIG environment variable.
# ════════════════════════════════════════════════════════════════════════════

# Global video format (vertical by default).
format:
  width: 1080
  height: 1920
  fps: 30

# Default language for categories that don't specify one.
defaultLanguage: fr

# ─── Audio ─────────────────────────────────────────────────────────────────
# mode: "music" = royalty-free background music, NO voice (fixed scene durations);
#       "voice" = TTS voice-over (durations matched to the synthesized audio, see languages.*.tts).
audio:
  mode: music
  music:
    # Fixed track used for ALL videos (path relative to the root or absolute).
    # If empty/absent, the pipeline picks a track from `dir`.
    track: assets/music/morning-sky-by-roa-music.mp3
    dir: assets/music   # only picks here if `track` is not set
    fadeSec: 1.5        # fade in/out (s)
    volume: 1.0         # music volume (0–1; 1 = original volume)
  scene:                # fixed durations in music mode (short / punchy pacing)
    introSec: 3
    itemSec: 4

# ─── Languages ───────────────────────────────────────────────────────────────
# Each language drives: the TTS voice, the script language (Claude),
# the header label and the date format.
#   tts.engine : kokoro | piper | xtts  (the matching Python wrapper must exist)
#   tts.voice  : engine-specific voice identifier
languages:
  fr:
    name: français
    uiLabel: VEILLE
    dateLocale: fr-FR
    tts:
      engine: piper
      # Piper FR model; "#1" = speaker "pierre" (male voice of the upmc model).
      voice: "fr_FR-upmc-medium#1"
  en:
    name: English
    uiLabel: TECH WATCH
    dateLocale: en-US
    tts:
      engine: kokoro
      voice: af_heart

# ─── Categories ────────────────────────────────────────────────────────────
# Each category: id (slug), label, emoji, accentColor (#hex), maxItems, feeds.
# `aggregate: true` = category with no feeds of its own, built from the top item
# of each other category (e.g. Global).
# `language: en` (optional) targets a language different from defaultLanguage.
categories:
  - id: global
    label: Global / News Tech
    emoji: 🌍
    accentColor: '#4ea8ff'
    maxItems: 6
    aggregate: true
    feeds: []

  - id: ia
    label: AI
    emoji: 🧠
    accentColor: '#a974ff'
    maxItems: 5
    feeds:
      - https://hnrss.org/newest?q=Anthropic&points=100
      - https://openai.com/blog/rss.xml
      - https://simonwillison.net/atom/everything/
      - https://thegradient.pub/rss/
      - https://lilianweng.github.io/index.xml
      - https://hnrss.org/newest?q=LLM+OR+%22language+model%22+OR+%22AI+coding%22&points=150
      - https://huggingface.co/blog/feed.xml
      - https://blog.google/technology/ai/rss/

  - id: typescript
    label: TypeScript / JS
    emoji: 📐
    accentColor: '#3aa0ff'
    maxItems: 5
    feeds:
      - https://javascriptweekly.com/rss/
      - https://nodejs.org/en/feed/blog.xml
      - https://deno.com/feed
      - https://bun.sh/rss.xml
      - https://devblogs.microsoft.com/typescript/feed/
      - https://nextjs.org/feed.xml
      - https://hnrss.org/newest?q=TypeScript+OR+Node.js+OR+Deno+OR+Bun&points=80

  - id: java
    label: Java / JVM
    emoji: ☕
    accentColor: '#f0894e'
    maxItems: 5
    feeds:
      - https://inside.java/feed.xml
      - https://feeds.feedblitz.com/baeldung&x=1
      - https://spring.io/blog.atom
      - https://blog.jetbrains.com/idea/feed/
      - https://hnrss.org/newest?q=Java+OR+JVM+OR+Spring+OR+Kotlin&points=80

  - id: rust
    label: Rust
    emoji: 🦀
    accentColor: '#ff7043'
    maxItems: 5
    feeds:
      - https://blog.rust-lang.org/feed.xml
      - https://this-week-in-rust.org/rss.xml
      - https://hnrss.org/newest?q=Rust&points=80

  - id: securite
    label: Security
    emoji: 🛡️
    accentColor: '#ff5577'
    maxItems: 6
    feeds:
      - https://www.cert.ssi.gouv.fr/alerte/feed/
      - https://www.cert.ssi.gouv.fr/avis/feed/
      - https://feeds.feedburner.com/TheHackersNews
